<!doctype html>
<html lang="en-us">
  <head>
    <title>Hagemu GameBoy Emulator</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="Hagemu is a gameboy emulator. It runs completely in your browser, has excellent compatibility, supports gamepads, and persistently retains your save data.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./images/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="./images/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      body {
	  font-family: arial;
	  margin: 0;
	  padding: none;
	  background-color: #306657;
      }

      a {
          color: inherit;
          text-decoration: none;
      }

      a:hover {
          filter: brightness(0.85);
      }

      button {
          color: inherit;
          background: #2e6354;
          border: 1px;
          border-radius: 5px;
          padding: 7px;
          font: inherit;
          cursor: pointer;
          outline: inherit;
          margin: 2px;
          box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
      }

      .circle-button {
          position: absolute;
          font-size: 200%;
          width: 10vh;
          height: 10vh;
          border-radius: 50%;
          background-color: red;
          border: none;
          cursor: pointer;
      }

      .dpad-button {
          position: absolute;
          font-size: 200%;
          width: 8vh;
          height: 8vh;
          background-color: darkgrey;
          border: none;
          cursor: pointer;
      }

      button:hover {
          filter: brightness(0.85);
      }

      #content {
          position: absolute;
          background-color: #20453A;
          border: 15px #20453A solid;
          border-radius: 15px;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      #canvas {
          outline: none;
          border-radius: 5px;
          display: block;
          margin: 0;
          padding: 0;
          image-rendering: pixelated;
          image-rendering: -moz-crisp-edges;
          image-rendering: crisp-edges;
      }

      #logo {
          font-size: calc(var(--gb-scale) * 6px);
          padding: 5px;
	  font-family: "Courier New", monospace;
	  font-weight: bold;
	  color: #8abd4c;
	  text-align: center;
      }

      #under-logo {
          font-size: calc(var(--gb-scale) * 3px);
          vertical-align: middle;
          white-space: nowrap;
          text-align: center;
	  font-family: "Courier New", monospace;
	  font-weight: bold;
	  color: #8abd4c;
	  text-align: center;
      }

      #status {
          display: inline-block;
          vertical-align: top;
          margin-top: 0px;
          margin-left: 0px;
          display: none;
          font-weight: bold;
          color: rgb(120, 120, 120);
      }

      #terminal-output {
          position: absolute;
          display: none;
          border-radius: 5px;
          box-sizing: border-box;
          width: 100%;
          aspect-ratio: 160 / 144;
          border: 0;
          padding: 5px;
          background-color: black;
          color: white;
          font-family: 'Lucida Console', Monaco, monospace;
          resize: none;
      }

    </style>
  </head>
  <body>

    <div id='spinner'></div>
    <div id="status"></div>
    <progress value="0" max="100" id="progress" hidden=1></progress>
    <div id="content">
      <textarea readonly id="terminal-output" rows="8"></textarea>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
      <div id="logo">
        <a href="https://github.com/brennier/hagemu">Hagemu Gameboy Emulator</a>
      </div>
      <div id="under-logo">
        <label style="cursor:pointer;">
          <button onclick="triggerRomUpload()">Upload ROM</button>
          <input type="file" accept=".gb,.gbc" id="romFileInput" style="display:none" />
        </label>
        <label style="cursor:pointer;">
          <button onclick="triggerSaveUpload()">Upload Save File</button>
          <input type="file" accept=".sav,.sram" id="saveFileInput" style="display:none" />
        </label>
        <button onclick="downloadSRAM()">Download Save File</button>
	<button id="terminal-button">Show Terminal Output</button>
      </div>
    </div>

    <!-- <button style="top:70%; left:85%; transform: translate(-50%,-50%);" id="button_a" class="circle-button">A</button> -->
    <!-- <button style="top:80%; left:65%; transform: translate(-50%,-50%);" id="button_b" class="circle-button">B</button> -->
    <!-- <button style="top:70%; left:15vh; transform: translate(-50%,-50%);" id="button_up" class="dpad-button">↑</button> -->
    <!-- <button style="top:86%; left:15vh; transform: translate(-50%,-50%);" id="button_down" class="dpad-button">↓</button> -->
    <!-- <button style="top:78%; left:23vh; transform: translate(-50%,-50%);" id="button_right" class="dpad-button">→</button> -->
    <!-- <button style="top:78%; left:7vh; transform: translate(-50%,-50%);" id="button_left" class="dpad-button">←</button> -->

    <script type='text/javascript'>
      function web_setup_filesystem() {
	  FS.mkdir('/savedata');
	  FS.mount(IDBFS, {}, '/savedata');
	  FS.syncfs(true, function (err) {
	      if (err) {
		  console.log("Error loading the offline database");
	      } else {
		  console.log("Successfully loaded the offline database");
	      }
	  });
      }

      window.addEventListener("beforeunload", function (event) {
          Module._web_save_sram_file();
	  FS.syncfs(false, function (err) {
	      if (err) {
		  console.log("Error writing to the offline database");
	      } else {
		  console.log("Successfully wrote to the offline database");
	      }
	  });
      });

      function triggerRomUpload() {
          document.getElementById("romFileInput").click();
      }

      function triggerSaveUpload() {
          document.getElementById("saveFileInput").click();
      }

      document.getElementById("saveFileInput").addEventListener("change", uploadFile);
      document.getElementById("romFileInput").addEventListener("change", uploadFile);

      async function uploadFile(event) {
          const file = event.target.files[0];
          if (!file) return;

          try {
              const buffer = await file.arrayBuffer();
              const data = new Uint8Array(buffer);

              // FS.mkdir("/tmp");
              const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
              const path = "/tmp/" + safeName;

              // Write file into virtual FS
              FS.writeFile(path, data);

              Module.ccall("web_load_file", null, ["string"], [path]);
          } catch (err) {
              console.error(err);
              alert("Failed to load file.");
          }
      }

      function downloadSRAM() {
          const ptr          = Module._web_get_sram_pointer();
          const size         = Module._web_get_sram_size();
          const filename_ptr = Module._web_get_sram_file_name();
          const filename     = Module.UTF8ToString(filename_ptr);

          if (!ptr || size <= 0) {
              alert("No save data available to download.");
              return;
          }

          // Copy from WASM heap
          const data = new Uint8Array(Module.HEAPU8.buffer, ptr, size);

          // IMPORTANT: copy it out (avoid referencing live WASM memory)
          const copy = new Uint8Array(data);

          // Create file
          const blob = new Blob([copy], { type: "application/octet-stream" });

          // Create download link
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();

          // Cleanup
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
      }

      function resizeCanvas() {
          const scale = Math.floor(Math.min(
              (window.innerWidth - 30)  / 160, // 30px for the border
              (0.9 * window.innerHeight - 50) / 144 // 50px for the border + padding
          ));
          canvas.style.width  = (160 * scale) + 'px';
          canvas.style.height = (144 * scale) + 'px';

          document.documentElement.style.setProperty('--gb-scale', scale);
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      var button = document.getElementById('terminal-button');
      button.onclick = function() {
          var div = document.getElementById('terminal-output');
          if (div.style.display == 'block') {
              div.style.display = 'none';
          }
          else {
              div.style.display = 'block';
              div.scrollTop = textarea.scrollHeight;
          }
      };

      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('terminal-output');
      if (outputElement) outputElement.value = ''; // clear browser cache

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener('webglcontextlost', (e) => {
          alert('WebGL context lost. You will need to reload the page.');
          e.preventDefault();
      }, false);

      var Module = {
          onRuntimeInitialized: function() {
              web_setup_filesystem();
          },
          print(...args) {
              console.log(...args);
              if (outputElement) {
                  var text = args.join(' ');
                  outputElement.value += text + "\n";
                  outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
              }
          },
          canvas: canvasElement,
          setStatus(text) {
              Module.setStatus.last ??= { time: Date.now(), text: '' };
              if (text === Module.setStatus.last.text) return;
              var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
              var now = Date.now();
              // if this is a progress update, skip it if too soon
              if (m && now - Module.setStatus.last.time < 30) return;
              Module.setStatus.last.time = now;
              Module.setStatus.last.text = text;
              if (m) {
                  text = m[1];
                  progressElement.value = parseInt(m[2])*100;
                  progressElement.max = parseInt(m[4])*100;
                  progressElement.hidden = false;
                  spinnerElement.hidden = false;
              } else {
                  progressElement.value = null;
                  progressElement.max = null;
                  progressElement.hidden = true;
                  if (!text) spinnerElement.style.display = 'none';
              }
              statusElement.innerHTML = text;
          },
          totalDependencies: 0,
          monitorRunDependencies(left) {
              this.totalDependencies = Math.max(this.totalDependencies, left);
              Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
          }
      };
      Module.setStatus('Downloading...');
      window.onerror = (event) => {
          // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
          Module.setStatus('Exception thrown, see JavaScript console');
          spinnerElement.style.display = 'none';
          Module.setStatus = (text) => {
              if (text) console.error('[post-exception status] ' + text);
          };
      };
    </script>
    <script async type="text/javascript" src="hagemu.js"></script>
  </body>
</html>
